name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        continue-on-error: ${{ matrix.python-version == '3.14' }}
        run: |
          set -euo pipefail
          uv sync --extra dev --frozen
          uv pip install "hypothesis>=6.100.0"
      - name: Validate shell scripts
        run: |
          set -euo pipefail
          bash -n scripts/*.sh
      - name: Run tests with coverage
        run: |
          set -euo pipefail
          uv run pytest -q --cov=nz_legislation_corpus --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: ./coverage.xml
      - name: Check version and release consistency
        run: |
          set -euo pipefail
          uv run python scripts/check_version_consistency.py
      - name: Fixture smoke corpus
        env:
          NZLC_OUTPUT_DIR: data
          ARCHIVE_CREATORS_JSON: '[{"name":"Test Maintainer"}]'
        run: |
          set -euo pipefail
          uv run nzlc smoke-fixture --output-dir data
          uv run nzlc validate
          uv run nzlc manifest
          uv run nzlc coverage-report

  tests:
    name: tests
    runs-on: ubuntu-latest
    needs: python-tests
    if: ${{ always() }}
    steps:
      - name: Verify Python test matrix
        env:
          PYTHON_TESTS_RESULT: ${{ needs.python-tests.result }}
        run: |
          set -euo pipefail
          if [ "$PYTHON_TESTS_RESULT" != "success" ]; then
            echo "Python test matrix result: $PYTHON_TESTS_RESULT" >&2
            exit 1
          fi
          echo "Python test matrix passed."
