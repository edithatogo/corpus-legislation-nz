name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --extra dev --frozen
      - name: Validate shell scripts
        run: |
          set -euo pipefail
          bash -n scripts/*.sh
      - name: Run tests with coverage
        run: |
          set -euo pipefail
          uv run pytest -q --cov=nz_legislation_corpus --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: ./coverage.xml
      - name: Check version and release consistency
        run: |
          set -euo pipefail
          uv run python scripts/check_version_consistency.py
      - name: Fixture smoke corpus
        env:
          NZLC_OUTPUT_DIR: data
          ARCHIVE_CREATORS_JSON: '[{"name":"Test Maintainer"}]'
        run: |
          set -euo pipefail
          uv run nzlc smoke-fixture --output-dir data
          uv run nzlc validate
          uv run nzlc manifest
          uv run nzlc coverage-report
