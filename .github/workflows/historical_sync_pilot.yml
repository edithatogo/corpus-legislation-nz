name: Historical corpus sync pilot

on:
  workflow_dispatch:
    inputs:
      search_terms:
        description: "Comma-separated search terms for seed discovery"
        type: string
        default: "act,bill,regulation,order,notice"
      legislation_status:
        description: "Status filter; use none to omit"
        type: string
        default: "none"
      legislation_types:
        description: "Comma-separated legislation types"
        type: string
        default: "act,bill,secondary_legislation,amendment_paper"
      max_pages:
        description: "Optional page limit per search/type query"
        type: string
        default: "2"
      max_works:
        description: "Total discovered-work and sync limit"
        type: string
        default: "50"
      min_seconds_between_requests:
        description: "Optional request spacing override in seconds"
        type: string
        default: "0.5"

permissions:
  contents: read

jobs:
  pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Discover pilot seed
        env:
          NZ_LEGISLATION_API_KEY: ${{ secrets.NZ_LEGISLATION_API_KEY }}
          NZLC_SEARCH_FIELD: ${{ vars.NZLC_SEARCH_FIELD || 'title' }}
          NZLC_SEARCH_SORT_BY: ${{ vars.NZLC_SEARCH_SORT_BY || 'most_recently_updated' }}
          NZLC_INPUT_MIN_SECONDS: ${{ inputs.min_seconds_between_requests }}
          NZLC_INPUT_SEARCH_TERMS: ${{ inputs.search_terms }}
          NZLC_INPUT_LEGISLATION_STATUS: ${{ inputs.legislation_status }}
          NZLC_INPUT_LEGISLATION_TYPES: ${{ inputs.legislation_types }}
          NZLC_INPUT_MAX_PAGES: ${{ inputs.max_pages }}
          NZLC_INPUT_MAX_WORKS: ${{ inputs.max_works }}
        run: |
          set -euo pipefail
          if [ -n "$NZLC_INPUT_MIN_SECONDS" ]; then
            export NZLC_MIN_SECONDS_BETWEEN_REQUESTS="$NZLC_INPUT_MIN_SECONDS"
          fi
          args=(
            --search-terms "$NZLC_INPUT_SEARCH_TERMS"
            --legislation-status "$NZLC_INPUT_LEGISLATION_STATUS"
            --legislation-types "$NZLC_INPUT_LEGISLATION_TYPES"
            --output-path generated/historical-work-ids.txt
            --provenance-path generated/historical-work-ids.provenance.json
          )
          if [ -n "$NZLC_INPUT_MAX_PAGES" ]; then args+=(--max-pages "$NZLC_INPUT_MAX_PAGES"); fi
          if [ -n "$NZLC_INPUT_MAX_WORKS" ]; then args+=(--max-works "$NZLC_INPUT_MAX_WORKS"); fi
          uv run nzlc discover-work-ids "${args[@]}"

      - name: Sync pilot corpus
        env:
          NZ_LEGISLATION_API_KEY: ${{ secrets.NZ_LEGISLATION_API_KEY }}
          NZLC_OUTPUT_DIR: data-historical-pilot
          NZLC_INPUT_MIN_SECONDS: ${{ inputs.min_seconds_between_requests }}
          NZLC_INPUT_MAX_WORKS: ${{ inputs.max_works }}
        run: |
          set -euo pipefail
          if [ -n "$NZLC_INPUT_MIN_SECONDS" ]; then
            export NZLC_MIN_SECONDS_BETWEEN_REQUESTS="$NZLC_INPUT_MIN_SECONDS"
          fi
          args=(
            --seed-work-ids generated/historical-work-ids.txt
            --allow-no-search-terms
            --replace
          )
          if [ -n "$NZLC_INPUT_MAX_WORKS" ]; then args+=(--max-works "$NZLC_INPUT_MAX_WORKS"); fi
          uv run nzlc sync "${args[@]}"

      - name: Validate and summarize pilot
        env:
          NZLC_OUTPUT_DIR: data-historical-pilot
        run: |
          set -euo pipefail
          uv run nzlc validate
          uv run nzlc manifest
          uv run nzlc coverage-report

      - name: Record publication policy
        run: |
          set -euo pipefail
          mkdir -p data-historical-pilot/manifests
          cat > data-historical-pilot/manifests/publication_policy.json <<'JSON'
          {
            "schema_version": "1.0",
            "policy": "artifact_only_historical_candidate",
            "live_huggingface_dataset": "edithatogo/nz-legislation-corpus",
            "live_dataset_boundary": "verified partial/API-discovery corpus",
            "historical_upload_allowed": false,
            "historical_publication_policy_doc": "docs/historical_publication_policy.md",
            "notes": [
              "Do not upload historical pilot outputs over the live Hugging Face dataset.",
              "Use a separate historical target only after seed, manifest, coverage, and failed-version state are reviewed."
            ]
          }
          JSON

      - name: Upload pilot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: historical-sync-pilot
          path: |
            generated/
            data-historical-pilot/records.jsonl
            data-historical-pilot/manifests/
            data-historical-pilot/_state/
          if-no-files-found: error
