name: Historical Hugging Face upload

on:
  workflow_dispatch:
    inputs:
      upload_confirmed:
        description: "Actually upload to HF_HISTORICAL_REPO_ID; false performs a no-upload dry run"
        type: boolean
        default: false
      search_terms:
        description: "Comma-separated search terms for seed discovery"
        type: string
        default: "act,bill,regulation,order,notice"
      legislation_status:
        description: "Status filter; use none to omit"
        type: string
        default: "none"
      legislation_types:
        description: "Comma-separated legislation types"
        type: string
        default: "act,bill,secondary_legislation,amendment_paper"
      max_pages:
        description: "Optional page limit per search/type query; use none for no limit"
        type: string
        default: "2"
      max_works:
        description: "Total discovered-work and sync limit; use none for no limit"
        type: string
        default: "50"
      seed_work_ids_path:
        description: "Optional checked-in reviewed seed/batch file. If set, discovery is skipped."
        type: string
        default: ""
      merge_policy:
        description: "Historical merge policy: restore_merge, replace_existing, or no_restore_incremental"
        type: choice
        options:
          - restore_merge
          - replace_existing
          - no_restore_incremental
        default: restore_merge
      min_seconds_between_requests:
        description: "Optional request spacing override in seconds"
        type: string
        default: "0.5"
      upload_options:
        description: "Optional comma-separated upload options: force,private"
        type: string
        default: ""

concurrency:
  group: historical-hf-upload-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  historical-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HISTORICAL_OUTPUT_DIR: data-historical-upload
    steps:
      - uses: actions/checkout@v6

      - name: Guard historical dataset target
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
          INPUT_UPLOAD_CONFIRMED: ${{ inputs.upload_confirmed }}
          INPUT_SEED_WORK_IDS_PATH: ${{ inputs.seed_work_ids_path }}
          INPUT_MERGE_POLICY: ${{ inputs.merge_policy }}
          INPUT_UPLOAD_OPTIONS: ${{ inputs.upload_options }}
        run: |
          set -euo pipefail
          python scripts/historical_workflow_helpers.py guard-target \
            --historical-repo-id "${HF_HISTORICAL_REPO_ID:-}" \
            --live-repo-id "${HF_REPO_ID:-}" \
            --summary-path "$GITHUB_STEP_SUMMARY"
          {
            echo "Upload confirmed: $INPUT_UPLOAD_CONFIRMED"
            echo "Seed work IDs path: $INPUT_SEED_WORK_IDS_PATH"
            echo "Merge policy: $INPUT_MERGE_POLICY"
            echo "Upload options: $INPUT_UPLOAD_OPTIONS"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$INPUT_UPLOAD_CONFIRMED" = "true" ] && \
             [ "$INPUT_MERGE_POLICY" = "no_restore_incremental" ]; then
            echo "Confirmed incremental upload requires merge_policy=restore_merge unless merge_policy=replace_existing." >&2
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Discover historical seed
        if: ${{ inputs.seed_work_ids_path == '' }}
        env:
          NZ_LEGISLATION_API_KEY: ${{ secrets.NZ_LEGISLATION_API_KEY }}
          NZLC_SEARCH_FIELD: ${{ vars.NZLC_SEARCH_FIELD || 'title' }}
          NZLC_SEARCH_SORT_BY: ${{ vars.NZLC_SEARCH_SORT_BY || 'most_recently_updated' }}
          NZLC_INPUT_MIN_SECONDS: ${{ inputs.min_seconds_between_requests }}
          NZLC_INPUT_SEARCH_TERMS: ${{ inputs.search_terms }}
          NZLC_INPUT_LEGISLATION_STATUS: ${{ inputs.legislation_status }}
          NZLC_INPUT_LEGISLATION_TYPES: ${{ inputs.legislation_types }}
          NZLC_INPUT_MAX_PAGES: ${{ inputs.max_pages }}
          NZLC_INPUT_MAX_WORKS: ${{ inputs.max_works }}
        run: |
          set -euo pipefail
          add_optional_limit() {
            local flag="$1"
            local value="$2"
            case "${value,,}" in
              ""|"none"|"null"|"-") return 0 ;;
              *) args+=("$flag" "$value") ;;
            esac
          }

          if [ -n "$NZLC_INPUT_MIN_SECONDS" ]; then
            export NZLC_MIN_SECONDS_BETWEEN_REQUESTS="$NZLC_INPUT_MIN_SECONDS"
          fi
          args=(
            --search-terms "$NZLC_INPUT_SEARCH_TERMS"
            --legislation-status "$NZLC_INPUT_LEGISLATION_STATUS"
            --legislation-types "$NZLC_INPUT_LEGISLATION_TYPES"
            --output-path generated/historical-work-ids.txt
            --provenance-path generated/historical-work-ids.provenance.json
          )
          add_optional_limit --max-pages "$NZLC_INPUT_MAX_PAGES"
          add_optional_limit --max-works "$NZLC_INPUT_MAX_WORKS"
          uv run nzlc discover-work-ids "${args[@]}"

      - name: Prepare reviewed historical seed
        if: ${{ inputs.seed_work_ids_path != '' }}
        env:
          INPUT_SEED_WORK_IDS_PATH: ${{ inputs.seed_work_ids_path }}
        run: |
          set -euo pipefail
          seed_path="$INPUT_SEED_WORK_IDS_PATH"
          mkdir -p generated
          cp "$seed_path" generated/historical-work-ids.txt
          uv run python scripts/historical_workflow_helpers.py seed-provenance \
            --seed-path "$seed_path" \
            --output-path generated/historical-work-ids.provenance.json

      - name: Restore existing historical dataset
        if: ${{ inputs.merge_policy == 'restore_merge' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import os
          import shutil
          import time
          from pathlib import Path

          from huggingface_hub import snapshot_download
          from huggingface_hub.utils import HfHubHTTPError, LocalEntryNotFoundError, RepositoryNotFoundError

          repo_id = os.environ["HF_HISTORICAL_REPO_ID"]
          token = os.environ.get("HF_TOKEN") or None
          output_dir = Path(os.environ["HISTORICAL_OUTPUT_DIR"])
          output_dir.mkdir(parents=True, exist_ok=True)

          allow_patterns = [
              "README.md",
              "records.jsonl",
              "_state/**",
              "manifests/**",
              "parquet/**",
              "raw_xml/**",
          ]
          snapshot = None
          for attempt in range(1, 6):
              try:
                  snapshot = Path(
                      snapshot_download(
                          repo_id=repo_id,
                          repo_type="dataset",
                          token=token,
                          allow_patterns=allow_patterns,
                      )
                  )
                  break
              except RepositoryNotFoundError:
                  print(f"No existing historical dataset to restore: {repo_id}")
                  raise SystemExit(0)
              except (HfHubHTTPError, LocalEntryNotFoundError) as exc:
                  if attempt == 5:
                      raise
                  sleep_seconds = min(300, 30 * attempt)
                  print(
                      f"Historical dataset restore failed on attempt {attempt}: {exc}. "
                      f"Retrying in {sleep_seconds}s."
                  )
                  time.sleep(sleep_seconds)
          if snapshot is None:
              raise SystemExit("Historical dataset restore did not produce a snapshot path.")

          restored = []
          for rel in ["README.md", "records.jsonl", "_state", "manifests", "parquet", "raw_xml"]:
              src = snapshot / rel
              dst = output_dir / rel
              if not src.exists():
                  continue
              if src.is_dir():
                  if dst.exists():
                      shutil.rmtree(dst)
                  shutil.copytree(src, dst)
              else:
                  dst.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(src, dst)
              restored.append(rel)
          print(f"Restored {len(restored)} historical dataset path(s): {', '.join(restored)}")
          PY

      - name: Sync historical corpus
        env:
          NZ_LEGISLATION_API_KEY: ${{ secrets.NZ_LEGISLATION_API_KEY }}
          NZLC_OUTPUT_DIR: ${{ env.HISTORICAL_OUTPUT_DIR }}
          MERGE_POLICY: ${{ inputs.merge_policy }}
          NZLC_INPUT_MIN_SECONDS: ${{ inputs.min_seconds_between_requests }}
          NZLC_INPUT_MAX_WORKS: ${{ inputs.max_works }}
        run: |
          set -euo pipefail
          add_optional_limit() {
            local flag="$1"
            local value="$2"
            case "${value,,}" in
              ""|"none"|"null"|"-") return 0 ;;
              *) args+=("$flag" "$value") ;;
            esac
          }

          if [ -n "$NZLC_INPUT_MIN_SECONDS" ]; then
            export NZLC_MIN_SECONDS_BETWEEN_REQUESTS="$NZLC_INPUT_MIN_SECONDS"
          fi
          args=(
            --seed-work-ids generated/historical-work-ids.txt
            --allow-no-search-terms
          )
          if [ "$MERGE_POLICY" = "replace_existing" ]; then args+=(--replace); fi
          add_optional_limit --max-works "$NZLC_INPUT_MAX_WORKS"
          uv run nzlc sync "${args[@]}"

      - name: Stage historical dataset card
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import os
          import textwrap
          from pathlib import Path

          historical_repo_id = os.environ.get("HF_HISTORICAL_REPO_ID")
          output_dir = os.environ.get("HISTORICAL_OUTPUT_DIR")
          if not historical_repo_id:
              raise SystemExit("HF_HISTORICAL_REPO_ID is required.")
          if not output_dir:
              raise SystemExit("HISTORICAL_OUTPUT_DIR is required.")
          dataset_card = textwrap.dedent(f"""\
          ---
          license: other
          language:
          - en
          tags:
          - new-zealand
          - legislation
          - law
          - legal-corpus
          - historical
          - parquet
          pretty_name: New Zealand Legislation Historical Corpus
          ---

          # New Zealand Legislation Historical Corpus

          This dataset is the separate historical publication target for New Zealand legislation records collected through the official New Zealand Legislation API.

          It is distinct from the live partial/API-discovery dataset at `edithatogo/corpus-legislation-nz`. Historical uploads must target `{historical_repo_id}` and must not overwrite the live dataset.

          Coverage is not yet proven complete until the historical bootstrap plan, failed-version state, manifest, and coverage report are reviewed.
          """)
          Path(output_dir, "README.md").write_text(
              dataset_card,
              encoding="utf-8",
          )
          PY

      - name: Validate and summarize historical corpus
        env:
          NZLC_OUTPUT_DIR: ${{ env.HISTORICAL_OUTPUT_DIR }}
          HF_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
        run: |
          set -euo pipefail
          uv run nzlc validate
          uv run nzlc manifest
          uv run nzlc coverage-report

      - name: Record historical publication guardrails
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
          INPUT_UPLOAD_CONFIRMED: ${{ inputs.upload_confirmed }}
          INPUT_SEED_WORK_IDS_PATH: ${{ inputs.seed_work_ids_path }}
          INPUT_MERGE_POLICY: ${{ inputs.merge_policy }}
          INPUT_UPLOAD_OPTIONS: ${{ inputs.upload_options }}
        run: |
          set -euo pipefail
          uv run python scripts/historical_workflow_helpers.py publication-policy \
            --historical-repo-id "${HF_HISTORICAL_REPO_ID:-}" \
            --live-repo-id "${HF_REPO_ID:-}" \
            --seed-work-ids-path "${{ inputs.seed_work_ids_path }}" \
            --merge-policy "${{ inputs.merge_policy }}" \
            --output-dir "$HISTORICAL_OUTPUT_DIR"

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: historical-hf-upload-dry-run
          path: |
            generated/
            ${{ env.HISTORICAL_OUTPUT_DIR }}/records.jsonl
            ${{ env.HISTORICAL_OUTPUT_DIR }}/README.md
            ${{ env.HISTORICAL_OUTPUT_DIR }}/manifests/
            ${{ env.HISTORICAL_OUTPUT_DIR }}/_state/
          if-no-files-found: error

      - name: Upload to historical Hugging Face dataset
        if: ${{ inputs.upload_confirmed }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          NZLC_OUTPUT_DIR: ${{ env.HISTORICAL_OUTPUT_DIR }}
          HF_XET_HIGH_PERFORMANCE: "1"
          UPLOAD_OPTIONS: ${{ inputs.upload_options }}
        run: |
          set -euo pipefail
          args=()
          case ",${UPLOAD_OPTIONS}," in *",force,"*) args+=(--force);; esac
          case ",${UPLOAD_OPTIONS}," in *",private,"*) args+=(--private);; esac
          uv run nzlc hf-upload "${args[@]}"

      - name: Dry-run notice
        if: ${{ !inputs.upload_confirmed }}
        run: |
          set -euo pipefail
          echo "No upload performed. Set upload_confirmed=true only after reviewing the artifact outputs." >> "$GITHUB_STEP_SUMMARY"

      - name: Step summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Historical Hugging Face upload" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: manual only" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upload confirmed: ${{ inputs.upload_confirmed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merge policy: ${{ inputs.merge_policy }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upload options: ${{ inputs.upload_options }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Seed work IDs path: ${{ inputs.seed_work_ids_path }}" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          output_dir = Path(os.environ["HISTORICAL_OUTPUT_DIR"])
          state_path = output_dir / "_state" / "sync_state.json"
          manifest_path = output_dir / "manifests" / "latest_manifest.json"

          if state_path.exists():
              state = json.loads(state_path.read_text(encoding="utf-8"))
              stats = dict(state.get("last_stats", {}))
              warnings = list(stats.pop("warnings", []) or [])
              summary = {
                  "last_stats": stats,
                  "warning_count": len(warnings),
                  "warning_sample": warnings[:20],
                  "records_changed_on_disk": state.get("records_changed_on_disk"),
              }
              print("\n### Sync state")
              print("```json")
              print(json.dumps(summary, indent=2, sort_keys=True))
              print("```")

          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
              summary_keys = [
                  "schema_version",
                  "record_schema_version",
                  "record_count",
                  "content_sha256",
                  "manifest_sha256",
                  "generated_at",
              ]
              summary = {key: manifest.get(key) for key in summary_keys if key in manifest}
              print("\n### Manifest")
              print("```json")
              print(json.dumps(summary, indent=2, sort_keys=True))
              print("```")
          PY
