name: Historical work ID discovery

on:
  workflow_dispatch:
    inputs:
      search_terms:
        description: "Comma-separated search terms"
        type: string
        default: "act,bill,regulation,order,notice"
      legislation_status:
        description: "Status filter; use none to omit while discovering valid historical boundaries"
        type: string
        default: "none"
      legislation_types:
        description: "Comma-separated legislation types"
        type: string
        default: "act,bill,secondary_legislation,amendment_paper"
      max_pages:
        description: "Optional page limit per search/type query for pilots; use none for no limit"
        type: string
        default: "2"
      max_works:
        description: "Optional total discovered-work limit for pilots; use none for no limit"
        type: string
        default: "50"

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Discover historical work IDs
        env:
          NZ_LEGISLATION_API_KEY: ${{ secrets.NZ_LEGISLATION_API_KEY }}
          NZLC_SEARCH_FIELD: ${{ vars.NZLC_SEARCH_FIELD || 'title' }}
          NZLC_SEARCH_SORT_BY: ${{ vars.NZLC_SEARCH_SORT_BY || 'most_recently_updated' }}
          NZLC_INPUT_SEARCH_TERMS: ${{ inputs.search_terms }}
          NZLC_INPUT_LEGISLATION_STATUS: ${{ inputs.legislation_status }}
          NZLC_INPUT_LEGISLATION_TYPES: ${{ inputs.legislation_types }}
          NZLC_INPUT_MAX_PAGES: ${{ inputs.max_pages }}
          NZLC_INPUT_MAX_WORKS: ${{ inputs.max_works }}
        run: |
          set -euo pipefail
          add_optional_limit() {
            local flag="$1"
            local value="$2"
            case "${value,,}" in
              ""|"none"|"null"|"-") return 0 ;;
              *) args+=("$flag" "$value") ;;
            esac
          }

          args=(
            --search-terms "$NZLC_INPUT_SEARCH_TERMS"
            --legislation-status "$NZLC_INPUT_LEGISLATION_STATUS"
            --legislation-types "$NZLC_INPUT_LEGISLATION_TYPES"
            --output-path generated/historical-work-ids.txt
            --provenance-path generated/historical-work-ids.provenance.json
          )
          add_optional_limit --max-pages "$NZLC_INPUT_MAX_PAGES"
          add_optional_limit --max-works "$NZLC_INPUT_MAX_WORKS"
          uv run nzlc discover-work-ids "${args[@]}"

      - name: Upload discovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: historical-work-id-discovery
          path: generated/
          if-no-files-found: error
